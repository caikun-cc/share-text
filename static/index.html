<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享记事本</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <textarea id="editor" placeholder="开始输入您的笔记..."></textarea>
        
        <div class="sidebar">
            <div class="user-info-section">
                <div class="user-info-header">
                    <div class="user-info-title">用户信息</div>
                    <button class="edit-user-btn" onclick="openEditUserModal()">编辑</button>
                </div>
                <div class="user-details">
                    <div class="user-detail-item">
                        <div class="user-avatar-display">
                            <div id="display-avatar" class="user-avatar-small"></div>
                            <span id="display-username" class="user-name-display"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 编辑用户信息模态框 -->
            <div id="edit-user-modal" class="modal">
                <div class="modal-content">
                    <div class="modal-title">编辑用户信息</div>
                    <div class="form-group">
                        <label class="form-label" for="input-username">用户名</label>
                        <input type="text" id="input-username" class="form-input" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="input-color">颜色</label>
                        <input type="color" id="input-color" class="form-input">
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-secondary" onclick="closeEditUserModal()">取消</button>
                        <button class="btn btn-primary" onclick="saveUserInfo()">保存</button>
                    </div>
                </div>
            </div>

            <div class="online-users-section">
                <div class="online-users-title">在线用户</div>
                <ul id="user-list" class="user-list"></ul>
            </div>
        </div>

        <div id="connection-status" class="connection-status disconnected">已断开连接</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
